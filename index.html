<script>

  document.querySelectorAll('.tab').forEach(t=>t.style.display="none");

  .forEach(b=>b.classList.remove("active"));

  if(tab==="matches"){
    document.getElementById("tab-matches").style.display="block";

  }

  if(tab==="all"){
    document.getElementById("tab-all").style.display="block";
    document.querySelectorAll(".bottom button")[1].classList.add("active");
  }

  if(tab==="kupon"){
    document.getElementById("tab-kupon").style.display="block";
    document.querySelectorAll(".bottom button")[2].classList.add("active");
  }
}

/* FAKE LOADING */
setTimeout(()=>{
  document.getElementById("loading").style.display="none";
  document.getElementById("app").style.display="block";
},1500);
</script>

<script>
window.openMatch = function(id){

  let m = matches[id];

  let html = `
    <div class="card">

      <h2>${m.team1} vs ${m.team2}</h2>

      <br>

      <button onclick="addToCoupon('${m.team1} vs ${m.team2}','1','${m.k1}')">
        1 - ${m.k1}
      </button>

      <br><br>

      <button onclick="addToCoupon('${m.team1} vs ${m.team2}','X','${m.kx}')">
        X - ${m.kx}
      </button>

      <br><br>

      <button onclick="addToCoupon('${m.team1} vs ${m.team2}','2','${m.k2}')">
        2 - ${m.k2}
      </button>

      <br><br>

      <h3>Zdarzenia</h3>
  `;

  if(m.events && m.events.length > 0){

    m.events.forEach(ev=>{
      html += `
        <button onclick="addToCoupon('${m.team1} vs ${m.team2}','${ev.name}','${ev.odd}')">
          ${ev.name} (${ev.odd})
        </button>
        <br><br>
      `;
    });

  } else {
    html += `<p>Brak zdarzeń</p>`;
  }

  html += `
      <br>
      <button onclick="renderMatches()">⬅ Powrót</button>

    </div>
  `;

  document.getElementById("matchesList").innerHTML = html;
};
</script>

<script>

/* 🧠 KUPON */
let coupon = [];

/* ➕ DODAJ DO KUPONU */
window.addToCoupon = function(match, bet, odd){

  coupon.push({
    match,
    bet,
    odd: Number(odd)
  });

  updateCoupon();

  alert("Dodano do kuponu");
};

/* 🔄 UPDATE KUPONU */
function updateCoupon(){

  let el = document.getElementById("coupon");

  if(coupon.length === 0){
    el.innerHTML = "Brak zakładów";
    return;
  }

  let html = "";
  let totalOdd = 1;

  coupon.forEach((c,i)=>{

    totalOdd *= c.odd;

    html += `
      <div class="card">
        <p>${c.match}</p>
        <b>${c.bet}</b>
        <p>Kurs: ${c.odd}</p>

        <button onclick="removeCoupon(${i})">
          ❌ usuń
        </button>
      </div>
    `;
  });

  html += `
    <hr>
    <h3>Kurs łączny: ${totalOdd.toFixed(2)}</h3>

    <input id="stake" type="number" placeholder="Stawka">

    <br><br>

    <button onclick="placeBet()">
      🎟 OBSTAW
    </button>
  `;

  el.innerHTML = html;
}

/* ❌ USUŃ Z KUPONU */
window.removeCoupon = function(i){
  coupon.splice(i,1);
  updateCoupon();
};

/* 💰 OBSTAW */
window.placeBet = function(){

  let stake = Number(document.getElementById("stake").value);

  if(!stake || stake <= 0){
    alert("Podaj stawkę");
    return;
  }

  let totalOdd = 1;

  coupon.forEach(c=>{
    totalOdd *= c.odd;
  });

  let win = stake * totalOdd;

  alert("Możliwa wygrana: " + win.toFixed(2) + " zł");

  coupon = [];
  updateCoupon();
};

</script>

<script>

/* 💰 SALDO */
let balance = Number(localStorage.getItem("balance")) || 0;

/* 📊 UPDATE SALDA */
function updateBalance(){
  localStorage.setItem("balance", balance);
}

/* 💸 PLACE BET (Z AKTUALIZACJĄ) */
window.placeBet = function(){

  let stake = Number(document.getElementById("stake").value);

  if(!stake || stake <= 0){
    alert("Podaj stawkę");
    return;
  }

  let totalOdd = 1;

  coupon.forEach(c=>{
    totalOdd *= c.odd;
  });

  let win = stake * totalOdd;

  if(balance < stake){
    alert("Brak środków");
    return;
  }

  balance -= stake;
  updateBalance();

  saveHistory(stake, win);

  alert("Zakład przyjęty!\nWygrana: " + win.toFixed(2) + " zł");

  coupon = [];
  updateCoupon();
  updateUIBalance();
};

/* 📜 HISTORIA */
let history = JSON.parse(localStorage.getItem("history")) || [];

function saveHistory(stake, win){

  history.push({
    date: new Date().toLocaleString(),
    stake,
    win
  });

  localStorage.setItem("history", JSON.stringify(history));
}

/* 📄 POKAŻ HISTORIĘ */
window.showHistory = function(){

  let html = `<div class="card"><h2>Historia zakładów</h2>`;

  if(history.length === 0){
    html += "<p>Brak historii</p>";
  }

  history.forEach(h=>{
    html += `
      <div class="card">
        <p>${h.date}</p>
        <p>Stawka: ${h.stake} zł</p>
        <p>Wygrana: ${h.win.toFixed(2)} zł</p>
      </div>
    `;
  });

  html += "</div>";

  document.getElementById("matchesList").innerHTML = html;
};

/* 🔄 UPDATE UI SALDA */
function updateUIBalance(){

  let el = document.getElementById("balanceDisplay");

  if(el){
    el.innerText = balance.toFixed(2) + " zł";
  }
}

/* START */
updateUIBalance();

</script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import {
  getFirestore,
  doc,
  getDoc,
  setDoc
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

/* 🔥 FIREBASE */
const firebaseConfig = {
  apiKey: "TWOJ_API_KEY",
  authDomain: "maks-bet.firebaseapp.com",
  projectId: "maks-bet",
  storageBucket: "maks-bet.appspot.com",
  messagingSenderId: "342279278423",
  appId: "1:342279278423:web:094610e6c8a23e8f667812"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* 👤 USER ID (PROSTY SYSTEM) */
let userId = localStorage.getItem("userId");

if(!userId){
  userId = "user_" + Math.floor(Math.random()*999999999);
  localStorage.setItem("userId", userId);
}

/* 💰 POBIERZ SALDO */
async function loadBalance(){

  const ref = doc(db, "users", userId);
  const snap = await getDoc(ref);

  if(snap.exists()){
    balance = snap.data().balance || 0;
  } else {
    await setDoc(ref, { balance: 0 });
    balance = 0;
  }

  updateUIBalance();
}

/* 💾 ZAPIS SALDA */
async function saveBalance(){

  const ref = doc(db, "users", userId);

  await setDoc(ref, {
    balance: balance
  });

}

/* 💸 NADPISZ PLACE BET (ONLINE) */
window.placeBet = async function(){

  let stake = Number(document.getElementById("stake").value);

  if(!stake || stake <= 0){
    alert("Podaj stawkę");
    return;
  }

  let totalOdd = 1;

  coupon.forEach(c=>{
    totalOdd *= c.odd;
  });

  let win = stake * totalOdd;

  if(balance < stake){
    alert("Brak środków");
    return;
  }

  balance -= stake;

  await saveBalance();

  saveHistory(stake, win);

  alert("Zakład przyjęty!");

  coupon = [];
  updateCoupon();
  updateUIBalance();
};

/* 🔄 START */
loadBalance();

</script>

<script>

import {
  collection,
  getDocs,
  query,
  orderBy,
  limit
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

/* 🏆 RANKING */
window.showRanking = async function(){

  const q = query(
    collection(db, "users"),
    orderBy("balance", "desc"),
    limit(10)
  );

  const snap = await getDocs(q);

  let html = `
    <div class="card">
      <h2>🏆 Ranking graczy</h2>
  `;

  let i = 1;

  snap.forEach(doc=>{
    let d = doc.data();

    html += `
      <div class="card">
        <h3>#${i}</h3>
        <p>ID: ${doc.id}</p>
        <p>Saldo: ${d.balance.toFixed(2)} zł</p>
      </div>
    `;
    i++;
  });

  html += "</div>";

  document.getElementById("matchesList").innerHTML = html;
};

/* 🔘 DODAJ DO MENU */
window.showRankingButton = function(){

  let btn = document.createElement("button");
  btn.innerText = "🏆 Ranking";
  btn.style.position = "fixed";
  btn.style.bottom = "80px";
  btn.style.right = "10px";
  btn.style.padding = "10px";
  btn.style.zIndex = "9999";

  btn.onclick = showRanking;

  document.body.appendChild(btn);
};

showRankingButton();

</script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import {
  getFirestore,
  collection,
  getDocs
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

/* 🔥 FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "TWOJ_API_KEY",
  authDomain: "maks-bet.firebaseapp.com",
  projectId: "maks-bet",
  storageBucket: "maks-bet.appspot.com",
  messagingSenderId: "342279278423",
  appId: "1:342279278423:web:094610e6c8a23e8f667812"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* 🧠 GLOBAL MATCHES */
window.matches = [];

/* 🔄 LOAD MECZY */
async function loadMatches(){

  const snap = await getDocs(collection(db,"matches"));

  window.matches = [];

  snap.forEach(doc=>{
    window.matches.push(doc.data());
  });

  renderMatches();
}

/* 🎯 RENDER FIX */
window.renderMatches = function(){

  let html = "";

  window.matches.forEach((m,i)=>{

    html += `
      <div class="card" onclick="openMatch(${i})">
        <h2>${m.team1} vs ${m.team2}</h2>
        <p>1: ${m.k1} | X: ${m.kx} | 2: ${m.k2}</p>
      </div>
    `;

  });

  if(window.matches.length === 0){
    html = `<div class="card">Brak meczy</div>`;
  }

  document.getElementById("matchesList").innerHTML = html;
  document.getElementById("allMatches").innerHTML = html;
};

/* 🔄 AUTO REFRESH */
setInterval(loadMatches, 5000);
loadMatches();

</script>
